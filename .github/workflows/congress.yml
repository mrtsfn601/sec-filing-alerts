name: watch-congress

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 min, 24/7
  workflow_dispatch:
    inputs:
      mode:
        description: "blank=normal, test, seed, demo, dry-run"
        required: false
        default: ""
      member:
        description: "demo only this member (last name or full name); blank = all"
        required: false
        default: ""

concurrency:
  group: watch-congress
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.STATE_PUSH_TOKEN || github.token }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install poppler (pdftotext)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq poppler-utils

      - name: Run congress watcher
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CONGRESS_MEMBER: ${{ github.event.inputs.member }}
        run: |
          ARG=""
          case "${{ github.event.inputs.mode }}" in
            test) ARG="--test" ;;
            seed) ARG="--seed" ;;
            demo) ARG="--demo" ;;
            dry-run) ARG="--dry-run" ;;
          esac
          python congress_watch.py $ARG

      - name: Commit state if changed
        run: |
          if [[ -n "$(git status --porcelain congress_state.json)" ]]; then
            git config user.name  "filing-watch-bot"
            git config user.email "actions@users.noreply.github.com"
            git add congress_state.json
            git commit -m "congress state: new PTR(s) seen [skip ci]"
            git push
          else
            echo "congress_state.json unchanged; nothing to commit"
          fi
